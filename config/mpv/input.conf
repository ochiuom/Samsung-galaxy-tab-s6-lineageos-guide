# ── Seeking ─────────────────────────────────────────────────────────────
l      seek 5
h      seek -5
L      seek 30
H      seek -30

# ── Volume ──────────────────────────────────────────────────────────────
j      add volume -5
k      add volume 5
m      cycle mute

# ── Speed ───────────────────────────────────────────────────────────────
=      add speed 0.1
-      add speed -0.1
BS     set speed 1.0

# ── Subtitles ───────────────────────────────────────────────────────────
s      cycle sub
S      cycle sub down

# ── Playlist ────────────────────────────────────────────────────────────
>      playlist-next
<      playlist-prev

# ── Window ──────────────────────────────────────────────────────────────
f      cycle fullscreen

# ── Screenshots ─────────────────────────────────────────────────────────
ctrl+s screenshot video
ctrl+S screenshot

# ── Info ────────────────────────────────────────────────────────────────
i      script-binding stats/display-stats-toggle
A      cycle-values video-aspect-override "16:9" "4:3" "2.35:1" "-1"